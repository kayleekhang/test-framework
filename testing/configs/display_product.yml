product_type: display

api:
  endpoints:
    health:
      method: GET
      protocol: http
      host: localhost
      port: 8080
      path: /health

    alerts:
      method: GET
      protocol: http
      host: localhost
      port: 8080
      path: /api/alerts

ui:
  base_url: http://localhost:3000
  selenium:
    browser: chrome
    options:
      headless: false
      arguments:
        - --disable-dev-shm-usage
      page_load_strategy: normal
    timeouts:
      implicit_wait_seconds: 0
      page_load_seconds: 30
      script_seconds: 30
    window_size:
      width: 1440
      height: 900

  pages:
    dashboard:
      route: /
      page_type: dashboard
      elements:
        acknowledge_alert:
          type: button
          test_tag: acknowledge-alert

        alert_popup:
          type: popup
          test_tag: alert-popup

    settings:
      route: /settings
      page_type: settings
      elements:
        save:
          type: button
          test_tag: save-settings

        success_message:
          type: text
          test_tag: settings-saved-message
